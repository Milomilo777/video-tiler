name: Bug report
description: Something crashes, freezes, or behaves incorrectly
labels: [bug]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you expect instead?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: Shown in About → Help, or the VERSION file next to the exe
      placeholder: "1.3"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows
        - macOS
        - Linux
    validations:
      required: true
  - type: dropdown
    id: setup
    attributes:
      label: Setup
      options:
        - Single monitor
        - Multiple monitors
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant log lines
      description: |
        The log path is shown in About → Help. Default locations:
        Windows: %LOCALAPPDATA%\videotiler\videotiler\videotiler.log
        macOS: ~/Library/Application Support/videotiler/videotiler.log
      render: text
